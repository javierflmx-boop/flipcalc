<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlipCalc — LUMILA Holdings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F0E8; font-family: 'Nunito', sans-serif; }
    body { -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    @keyframes pop {
      0%   { transform: scale(0.93); opacity: 0; }
      60%  { transform: scale(1.04); }
      100% { transform: scale(1);    opacity: 1; }
    }
    .pop { animation: pop 0.3s cubic-bezier(.22,.68,0,1.2) forwards; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #C47EDB; cursor: pointer; }
    button { font-family: 'Nunito', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const GOLD  = "#C4962A";
    const RED   = "#FF5C5C";
    const GREEN = "#7EE8A2";

    const fmt = (n) => {
      if (n === null || n === undefined || isNaN(n)) return null;
      const abs = Math.abs(Math.round(n));
      const sign = n < 0 ? "-" : "";
      if (abs >= 1000000) return sign + `$${(abs/1000000).toFixed(1)}M`;
      if (abs >= 1000)    return sign + `$${(abs/1000).toFixed(0)}K`;
      return sign + `$${abs}`;
    };
    const fmtFull = (n) => {
      if (!n && n !== 0) return "";
      return (n < 0 ? "-$" : "$") + Math.abs(Math.round(n)).toLocaleString();
    };
    const valColor = (type) => {
      if (type === "earn")  return GOLD;
      if (type === "spend") return RED;
      return GREEN;
    };

    const MODES = [
      { key:"flip",   label:"FLIP\n70%",    color:"#F5A623" },
      { key:"sell",   label:"SELL\nPRICE",  color:"#5CC8C8" },
      { key:"budget", label:"MAT.\nBUDGET", color:"#C47EDB" },
    ];

    function DisplayField({ label, color, rawVal, isActive, onTap }) {
      const display = rawVal ? `$${parseFloat(rawVal).toLocaleString()}` : "";
      return (
        <div onClick={onTap} style={{ display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}>
          <div style={{ width:4, height:44, background:color, borderRadius:2, flexShrink:0, opacity:isActive?1:0.3, transition:"opacity 0.15s" }} />
          <div style={{ flex:1, opacity:isActive?1:0.55, transition:"opacity 0.15s" }}>
            <div style={{ fontSize:8, fontWeight:800, letterSpacing:"0.18em", color, textTransform:"uppercase", marginBottom:2 }}>{label}</div>
            <div style={{ fontSize:26, fontWeight:900, color:isActive?"#2A2118":"#8A7E6E", minHeight:32, letterSpacing:"-0.02em" }}>
              {display || <span style={{ color:"#C0B49A", fontWeight:400, fontSize:18 }}>tap to enter</span>}
            </div>
            <div style={{ height:2, background:isActive?color:"#E0D8CC", marginTop:3, borderRadius:1 }} />
          </div>
          {isActive && <div style={{ width:2, height:28, background:color, borderRadius:1 }} />}
        </div>
      );
    }

    function BigNum({ label, val, color }) {
      return (
        <div>
          <div style={{ fontSize:8, fontWeight:800, color:"#C0B49A", letterSpacing:"0.16em", marginBottom:2 }}>{label}</div>
          <div style={{ fontSize:32, fontWeight:900, color, lineHeight:1, letterSpacing:"-0.04em", textShadow:`2px 4px 0px ${color}28` }}>{val}</div>
        </div>
      );
    }

    function Keypad({ value, onChange, color }) {
      const press = (key) => {
        if (key === "⌫") { onChange(value.slice(0,-1)); return; }
        if (key === "C")  { onChange(""); return; }
        if (key === "K")  { const n = parseFloat(value)||0; if (n > 0) onChange(String(n*1000)); return; }
        if (value.length >= 9) return;
        onChange(value + key);
      };
      const keys = ["7","8","9","4","5","6","1","2","3","C","0","⌫"];
      return (
        <div style={{
          position:"fixed", bottom:14, left:14,
          width:"calc(100% - 88px)",
          background:"#1E1A14", borderRadius:16,
          padding:"8px 8px 10px", zIndex:100,
          boxShadow:"0 8px 28px #00000038",
        }}>
          <div style={{ marginBottom:5 }}>
            <button onClick={()=>press("K")} style={{
              width:"100%", background:"#2A2218", border:`1.5px solid ${color}50`, borderRadius:7,
              color, fontSize:10, fontWeight:900, letterSpacing:"0.12em", padding:"6px 0", cursor:"pointer",
            }}>× 1,000 (K)</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:5 }}>
            {keys.map((k) => {
              const isAction = k==="⌫"||k==="C";
              return (
                <button key={k} onClick={()=>press(k)} style={{
                  background:isAction?"#2E2820":"#252018", border:"none", borderRadius:8,
                  color:k==="C"?RED:k==="⌫"?"#999":"#F5F0E8",
                  fontSize:k==="⌫"?15:17, fontWeight:900, padding:"10px 0", cursor:"pointer",
                }}
                  onMouseDown={(e)=>{e.currentTarget.style.background="#3A3228";}}
                  onMouseUp={(e)=>{e.currentTarget.style.background=isAction?"#2E2820":"#252018";}}
                  onTouchStart={(e)=>{e.currentTarget.style.background="#3A3228";}}
                  onTouchEnd={(e)=>{e.currentTarget.style.background=isAction?"#2E2820":"#252018";}}
                >{k}</button>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [mode, setMode]         = useState("flip");
      const [arv, setArv]           = useState("");
      const [repairs, setRepairs]   = useState("");
      const [buyPrice, setBuyPrice] = useState("");
      const [materials, setMaterials] = useState("");
      const [budgetBuy, setBudgetBuy] = useState("");
      const [salePrice, setSalePrice] = useState("");
      const [profitPct, setProfitPct] = useState(15);
      const [active, setActive]     = useState("arv");
      const [result, setResult]     = useState(null);
      const [shake, setShake]       = useState(false);

      const triggerShake = () => { setShake(true); setTimeout(()=>setShake(false),400); };

      const fieldMap = {
        arv:           { get: arv,       set: setArv },
        repairs:       { get: repairs,   set: setRepairs },
        buyPrice:      { get: buyPrice,  set: setBuyPrice },
        materials:     { get: materials, set: setMaterials },
        budgetBuyPrice:{ get: budgetBuy, set: setBudgetBuy },
        salePrice:     { get: salePrice, set: setSalePrice },
      };

      const activeFieldKey = (() => {
        if (mode==="flip")   return active==="arv" ? "arv" : "repairs";
        if (mode==="sell")   return active==="buyPrice" ? "buyPrice" : "materials";
        if (mode==="budget") return active==="buyPrice" ? "budgetBuyPrice" : "salePrice";
        return "arv";
      })();

      const activeVal = fieldMap[activeFieldKey]?.get || "";
      const activeSet = fieldMap[activeFieldKey]?.set || (()=>{});

      const showKeypad = mode==="flip"
        ? active==="arv"||active==="repairs"
        : mode==="sell"
        ? active==="buyPrice"||active==="materials"
        : active==="buyPrice"||active==="salePrice";

      const calculate = () => {
        if (mode==="flip") {
          const a=parseFloat(arv)||0, r=parseFloat(repairs)||0;
          if (!a) { triggerShake(); return; }
          const maxOffer=a*0.70-r, closing=a*0.06, holding=a*0.03;
          const spread=a-maxOffer-r, profit=spread-closing-holding;
          const totalIn=maxOffer+r, roi=totalIn>0?(profit/totalIn)*100:0;
          const repairPct=a>0?(r/a)*100:0, profitPctV=a>0?(profit/a)*100:0;
          setResult({mode:"flip",arv:a,repairs:r,maxOffer,closing,holding,spread,profit,roi,repairPct,profitPctV});
          setActive("maxOffer");
        }
        if (mode==="sell") {
          const bp=parseFloat(buyPrice)||0, m=parseFloat(materials)||0;
          if (!bp) { triggerShake(); return; }
          const allIn=bp+m, c=0.06;
          setResult({mode:"sell",buyPrice:bp,materials:m,
            breakEven:allIn/(1-c),sell20:allIn/(1-c-0.20),
            sell30:allIn/(1-c-0.30),sell40:allIn/(1-c-0.40)});
          setActive("sell30");
        }
        if (mode==="budget") {
          const bp=parseFloat(budgetBuy)||0, sp=parseFloat(salePrice)||0;
          if (!bp||!sp) { triggerShake(); return; }
          const spread=sp-bp, closing=sp*0.06, holding=sp*0.03;
          const profit=sp*(profitPct/100), maxMat=spread-closing-holding-profit;
          setResult({mode:"budget",buyPrice:bp,salePrice:sp,spread,closing,holding,profit,maxMat,profitPct});
          setActive("maxMat");
        }
      };

      const reset = () => {
        setArv(""); setRepairs(""); setBuyPrice(""); setMaterials("");
        setBudgetBuy(""); setSalePrice(""); setResult(null);
        setActive(mode==="flip"?"arv":"buyPrice");
      };
      const switchMode = (m) => { setMode(m); setResult(null); setActive(m==="flip"?"arv":"buyPrice"); };

      const flipStrips = [
        {key:"arv",      label:"ARV",       color:"#5CC8C8",type:"info",  val:fmt(parseFloat(arv)||0),       sub:null},
        {key:"repairs",  label:"REPAIRS",   color:"#C47EDB",type:"spend", val:fmt(parseFloat(repairs)||0),   sub:result?`${Math.round(result.repairPct)}% ARV`:null},
        {key:"maxOffer", label:"MAX OFFER", color:"#F5A623",type:"info",  val:result?fmt(result.maxOffer):null,sub:"70% RULE"},
        {key:"spread",   label:"SPREAD",    color:"#F4845F",type:"info",  val:result?fmt(result.spread):null,  sub:"BEFORE COSTS"},
        {key:"closing",  label:"CLOSING",   color:"#E05B7A",type:"spend", val:result?fmt(result.closing):null, sub:"6% ARV"},
        {key:"holding",  label:"HOLDING",   color:"#6BAED6",type:"spend", val:result?fmt(result.holding):null, sub:"3% ARV"},
        {key:"profit",   label:"PROFIT",    color:"#5DB87A",type:"earn",  val:result?fmt(result.profit):null,  sub:result?`${Math.round(result.profitPctV)}% ARV`:null},
        {key:"roi",      label:"ROI",       color:"#A8CC5A",type:"earn",  val:result?`${Math.round(result.roi)}%`:null,sub:null},
      ];
      const sellStrips = [
        {key:"buyPrice",  label:"PAID",       color:"#F4845F",type:"spend",val:fmt(parseFloat(buyPrice)||0), sub:null},
        {key:"materials", label:"MATERIALS",  color:"#C47EDB",type:"spend",val:fmt(parseFloat(materials)||0),sub:null},
        {key:"breakEven", label:"BREAK EVEN", color:"#6BAED6",type:"info", val:result?fmt(result.breakEven):null,sub:null},
        {key:"sell20",    label:"SELL 20%",   color:"#5CC8C8",type:"earn", val:result?fmt(result.sell20):null,   sub:"+20%"},
        {key:"sell30",    label:"SELL 30%",   color:"#F5A623",type:"earn", val:result?fmt(result.sell30):null,   sub:"+30%"},
        {key:"sell40",    label:"SELL 40%",   color:"#5DB87A",type:"earn", val:result?fmt(result.sell40):null,   sub:"+40%"},
      ];
      const budgetStrips = [
        {key:"buyPrice",  label:"PAID",      color:"#F4845F",type:"spend",val:fmt(parseFloat(budgetBuy)||0),sub:null},
        {key:"salePrice", label:"SALE",      color:"#5CC8C8",type:"info", val:fmt(parseFloat(salePrice)||0),sub:null},
        {key:"spread",    label:"SPREAD",    color:"#F5A623",type:"info", val:result?fmt(result.spread):null, sub:null},
        {key:"closing",   label:"CLOSING",   color:"#E05B7A",type:"spend",val:result?fmt(result.closing):null,sub:"6%"},
        {key:"holding",   label:"HOLDING",   color:"#6BAED6",type:"spend",val:result?fmt(result.holding):null,sub:"3%"},
        {key:"profit",    label:"PROFIT",    color:"#5DB87A",type:"earn", val:result?fmt(result.profit):null, sub:result?`${result.profitPct}%`:null},
        {key:"maxMat",    label:"MAX MAT.",  color:"#C47EDB",type:"info", val:result?fmt(result.maxMat):null, sub:"BUDGET"},
      ];
      const currentStrips = mode==="flip"?flipStrips:mode==="sell"?sellStrips:budgetStrips;

      const heroMap = mode==="flip" ? {
        arv:      {val:parseFloat(arv)||0,     label:"After Repair Value",      color:"#5CC8C8"},
        repairs:  {val:parseFloat(repairs)||0, label:"Repair Cost",             color:"#C47EDB"},
        maxOffer: {val:result?.maxOffer??0,     label:"Max Offer (70% Rule)",   color:"#F5A623"},
        spread:   {val:result?.spread??0,       label:"Raw Spread (before costs)",color:"#F4845F"},
        closing:  {val:result?.closing??0,      label:"Closing Costs (6% ARV)", color:"#E05B7A"},
        holding:  {val:result?.holding??0,      label:"Holding Costs (3% ARV)", color:"#6BAED6"},
        profit:   {val:result?.profit??0,       label:"Real Profit",            color:result?.profit>=0?GOLD:"#E05B7A"},
        roi:      {val:result?.roi??0,          label:"Return on Investment",   color:"#A8CC5A",isPct:true},
      } : mode==="sell" ? {
        buyPrice:  {val:parseFloat(buyPrice)||0,  label:"Purchase Price",    color:"#F4845F"},
        materials: {val:parseFloat(materials)||0, label:"Labor & Materials", color:"#C47EDB"},
        breakEven: {val:result?.breakEven??0,      label:"Break-Even Sale",   color:"#6BAED6"},
        sell20:    {val:result?.sell20??0,         label:"Sale → 20% Profit", color:"#5CC8C8"},
        sell30:    {val:result?.sell30??0,         label:"Sale → 30% Profit", color:"#F5A623"},
        sell40:    {val:result?.sell40??0,         label:"Sale → 40% Profit", color:"#5DB87A"},
      } : {
        buyPrice:  {val:parseFloat(budgetBuy)||0, label:"Purchase Price",        color:"#F4845F"},
        salePrice: {val:parseFloat(salePrice)||0, label:"Target Sale Price",     color:"#5CC8C8"},
        spread:    {val:result?.spread??0,         label:"Gross Spread",          color:"#F5A623"},
        closing:   {val:result?.closing??0,        label:"Closing Costs (6%)",   color:"#E05B7A"},
        holding:   {val:result?.holding??0,        label:"Holding Costs (3%)",   color:"#6BAED6"},
        profit:    {val:result?.profit??0,         label:`Your Profit (${profitPct}%)`,color:"#5DB87A"},
        maxMat:    {val:result?.maxMat??0,         label:"Max Labor & Materials", color:"#C47EDB"},
      };

      const hero      = heroMap[active] || Object.values(heroMap)[0];
      const modeColor = MODES.find(m=>m.key===mode)?.color||"#F5A623";
      const keypadColor = mode==="flip"
        ? (active==="arv"?"#5CC8C8":"#C47EDB")
        : mode==="sell"
        ? (active==="buyPrice"?"#F4845F":"#C47EDB")
        : (active==="buyPrice"?"#F4845F":"#5CC8C8");

      return (
        <div style={{minHeight:"100vh",background:"#F5F0E8",display:"flex",flexDirection:"column",paddingBottom:showKeypad?210:0}}>

          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 66px 0 24px"}}>
            <div>
              <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.22em",color:"#C0B49A"}}>LUMILA HOLDINGS</div>
              <div style={{fontSize:20,fontWeight:900,color:"#2A2118",lineHeight:1.1}}>
                Flip<span style={{color:"#F5A623"}}>Calc</span>
              </div>
            </div>
            {result && <button onClick={reset} style={{background:"transparent",border:"1.5px solid #D0C8BC",borderRadius:20,color:"#A09080",fontSize:9,fontWeight:800,letterSpacing:"0.15em",padding:"5px 11px",cursor:"pointer"}}>RESET</button>}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:8,padding:"12px 66px 0 24px"}}>
            {MODES.map((m) => (
              <button key={m.key} onClick={()=>switchMode(m.key)} style={{
                flex:1,background:mode===m.key?m.color:"transparent",
                border:`2px solid ${mode===m.key?m.color:"#D8D0C4"}`,
                borderRadius:12,color:mode===m.key?"#fff":"#A09080",
                fontSize:8,fontWeight:900,letterSpacing:"0.1em",padding:"8px 4px",cursor:"pointer",lineHeight:1.35,
              }}>{m.label}</button>
            ))}
          </div>

          {/* Hero */}
          <div style={{padding:"12px 66px 0 24px"}}>
            <div style={{fontSize:10,fontWeight:800,color:hero.color,letterSpacing:"0.14em",textTransform:"uppercase"}}>{hero.label}</div>
            <div key={active+mode+String(hero.val)} className="pop" style={{fontSize:70,fontWeight:900,color:hero.color,lineHeight:1,letterSpacing:"-0.04em",textShadow:`4px 7px 0px ${hero.color}26`}}>
              {hero.isPct?`${Math.round(hero.val)}%`:(fmt(hero.val)||"$0")}
            </div>
            {!hero.isPct && <div style={{fontSize:11,fontWeight:700,color:"#B0A48E",marginTop:1}}>{fmtFull(hero.val)}</div>}
          </div>

          {/* Fields */}
          <div style={{padding:"14px 66px 0 24px",display:"flex",flexDirection:"column",gap:10}}>
            {mode==="flip" && <>
              <DisplayField label="ARV — After repair value"  color="#5CC8C8" rawVal={arv}     isActive={active==="arv"}     onTap={()=>setActive("arv")} />
              <DisplayField label="REPAIRS — Estimated cost"  color="#C47EDB" rawVal={repairs} isActive={active==="repairs"} onTap={()=>setActive("repairs")} />
            </>}
            {mode==="sell" && <>
              <DisplayField label="I PAID"            color="#F4845F" rawVal={buyPrice}  isActive={active==="buyPrice"}  onTap={()=>setActive("buyPrice")} />
              <DisplayField label="LABOR & MATERIALS" color="#C47EDB" rawVal={materials} isActive={active==="materials"} onTap={()=>setActive("materials")} />
            </>}
            {mode==="budget" && <>
              <DisplayField label="I PAID"          color="#F4845F" rawVal={budgetBuy} isActive={active==="buyPrice"}  onTap={()=>setActive("buyPrice")} />
              <DisplayField label="I CAN SELL FOR"  color="#5CC8C8" rawVal={salePrice} isActive={active==="salePrice"} onTap={()=>setActive("salePrice")} />
              <div style={{marginTop:2}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <div style={{fontSize:8,fontWeight:800,letterSpacing:"0.2em",color:"#C47EDB"}}>TARGET PROFIT</div>
                  <div style={{fontSize:16,fontWeight:900,color:"#C47EDB"}}>{profitPct}%</div>
                </div>
                <input type="range" min={5} max={40} step={1} value={profitPct}
                  onChange={(e)=>setProfitPct(Number(e.target.value))}
                  style={{width:"100%",background:`linear-gradient(to right,#C47EDB ${((profitPct-5)/35)*100}%,#E0D8CC ${((profitPct-5)/35)*100}%)`}} />
              </div>
            </>}
          </div>

          {/* Calculate */}
          <div style={{padding:"16px 66px 0 24px"}}>
            <button onClick={calculate} style={{
              animation:shake?"shake 0.4s ease":"none",
              width:"100%",background:"#2A2118",color:modeColor,
              border:"none",borderRadius:16,fontSize:13,fontWeight:900,
              letterSpacing:"0.22em",padding:"15px 0",cursor:"pointer",textTransform:"uppercase",
              boxShadow:"0 6px 24px #2A211820",
            }}
              onMouseDown={(e)=>{e.currentTarget.style.transform="scale(0.97)";}}
              onMouseUp={(e)=>{e.currentTarget.style.transform="scale(1)";}}
            >Calculate</button>
          </div>

          {/* Results */}
          {result && (
            <div className="pop" style={{display:"flex",gap:16,padding:"16px 66px 24px 24px",flexWrap:"wrap"}}>
              {mode==="flip" && <>
                <BigNum label="MAX OFFER"   val={fmt(result.maxOffer)} color={GREEN} />
                <BigNum label="REAL PROFIT" val={fmt(result.profit)}   color={result.profit>=0?GOLD:RED} />
                <BigNum label="ROI"         val={`${Math.round(result.roi)}%`} color={result.roi>=0?GOLD:RED} />
              </>}
              {mode==="sell" && <>
                <BigNum label="BREAK EVEN" val={fmt(result.breakEven)} color={GREEN} />
                <BigNum label="→ 20%"      val={fmt(result.sell20)}    color={GREEN} />
                <BigNum label="→ 30%"      val={fmt(result.sell30)}    color={GOLD} />
                <BigNum label="→ 40%"      val={fmt(result.sell40)}    color={GOLD} />
              </>}
              {mode==="budget" && <>
                <BigNum label="MAX MATERIALS" val={fmt(result.maxMat)} color={result.maxMat>0?GREEN:RED} />
                <BigNum label="YOUR PROFIT"   val={fmt(result.profit)} color={GOLD} />
                <BigNum label="CLOSING+HOLD"  val={fmt(result.closing+result.holding)} color={RED} />
              </>}
            </div>
          )}

          {/* Right strips */}
          <div style={{position:"fixed",right:0,top:0,height:"100vh",display:"flex",flexDirection:"column",width:60}}>
            {currentStrips.map((strip) => {
              const isActive = active===strip.key;
              const hasVal   = strip.val && strip.val!=="$0";
              const vc       = hasVal ? valColor(strip.type) : "#fff";
              return (
                <div key={strip.key} onClick={()=>setActive(strip.key)} style={{
                  flex:1,background:strip.color,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  cursor:"pointer",opacity:isActive?1:hasVal?0.85:0.42,
                  boxShadow:isActive?"inset -4px 0 0 #00000022":"none",
                  transition:"opacity 0.15s,box-shadow 0.15s",
                  padding:"3px 0",gap:2,
                }}>
                  {hasVal && <div style={{writingMode:"vertical-rl",transform:"rotate(180deg)",fontSize:strip.val.length>5?9:11,fontWeight:900,color:vc,letterSpacing:"0.02em",lineHeight:1,textShadow:"0 1px 4px #00000030"}}>{strip.val}</div>}
                  {hasVal && <div style={{width:18,height:1,background:"#ffffff40",margin:"1px 0"}} />}
                  <div style={{writingMode:"vertical-rl",transform:"rotate(180deg)",fontSize:7,fontWeight:900,letterSpacing:"0.13em",color:"#ffffffbb",textTransform:"uppercase",lineHeight:1.3}}>{strip.label}</div>
                  {strip.sub && hasVal && <div style={{writingMode:"vertical-rl",transform:"rotate(180deg)",fontSize:6,fontWeight:800,letterSpacing:"0.1em",color:"#ffffff60",textTransform:"uppercase"}}>{strip.sub}</div>}
                </div>
              );
            })}
          </div>

          {/* Keypad */}
          {showKeypad && <Keypad value={activeVal} onChange={activeSet} color={keypadColor} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
